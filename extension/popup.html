<!doctype html><html><head><meta charset="utf-8"><style>
body{font-family:-apple-system,Segoe UI,Roboto,"Noto Sans",sans-serif;width:250px;padding:12px;font-size:14px}
h1{font-size:14px;margin:0 0 8px}
button{display:block;width:100%;margin:4px 0;padding:8px;border:1px solid #ccc;border-radius:6px;background:#fff;cursor:pointer;font-size:13px}
button.on{background:#1e9e5a;color:#fff;border-color:#1e9e5a}
.ex{font-size:12px;color:#666;margin-top:10px;line-height:1.5}
.row{display:flex;justify-content:space-between;align-items:center;margin-top:8px;font-size:12px}
a{color:#1e7;cursor:pointer} small{color:#999}
</style></head><body>
<h1>發音導引層 · RP</h1>
<button data-d="off">關閉 Off</button>
<button data-d="advanced">進階 Advanced（只標會騙人的）</button>
<button data-d="full">全標 Full（童書級）</button>
<div class="ex">例:rising→<b>rīśiñg</b>。<br>Hover 任何字 → 看原拼(可剝離)。<br>Alt+點一個字 → 回報它(outlier crowdsourcing)。</div>
<div class="row"><span id="rc"></span><a id="exp">匯出回報 JSON</a></div>
<small id="ver"></small>
<script src="popup.js"></script>
</body></html>
